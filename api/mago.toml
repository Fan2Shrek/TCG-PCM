php-version = "8.5"

[source]
paths = [
  "src",
  "tests"
]
includes = ["vendor"]
excludes = ["tests/bootstrap.php", "tests/GameReplay/resources"]

[formatter]
print-width = 160
tab-width = 4
use-tabs = false
null-type-hint = "question"
space-around-concatenation-binary-operator = false

[linter]
integrations = ["symfony"]

[linter.rules]
ambiguous-function-call = { enabled = false }
literal-named-argument = { enabled = false }
halstead = { enabled = false }
strict-types = { enabled = false }
no-boolean-flag-parameter = { enabled = false }
single-class-per-file = { enabled = false }
too-many-methods = { enabled = false }
cyclomatic-complexity = { enabled = false }
no-assign-in-condition = { enabled = false }
kan-defect = { enabled = false }
excessive-parameter-list = { threshold = 10 }
no-else-clause = { enabled = false }
no-multi-assignments = { enabled = false }
no-literal-password = { exclude = ["tests"] }
sensitive-parameter = { exclude = ["tests"] }
too-many-enum-cases = { enabled = false }
no-isset = { enabled = false }

[analyzer]
excludes = ["tests", "src/DataFixtures", "src/Debug/GameDataCollector.php"]
baseline = "analyzer-baseline.toml"

find-unused-definitions = true
find-unused-expressions = false
analyze-dead-code = false
check-throws = true
allow-possibly-undefined-array-keys = true
ignore = ["missing-override-attribute", "unhandled-thrown-type", "mixed-assignment"]
