App\Entity\User:
    attributes:
        id:
            groups:
                - api:friendship:read
                - api:trade:read
        username:
            groups:
                - default
                - api:user:read
                - api:room:create
                - api:room:list
                - api:friendship:read
                - api:trade:read
        profilePicturePath:
            groups:
                - api:user:read
                - api:room:list
                - api:friendship:read
                - api:trade:read
        inventory:
            groups:
                - api:inventory:read
        userInfo:
            groups:
                - api:user:read
        userWallet:
            groups:
                - api:user:read
        userIdentifier:
            ignore: true
        roles:
            ignore: true
        password:
            ignore: true
        userBadges:
            ignore: true
        decks:
            ignore: true

App\Entity\UserInfo:
    attributes:
        lastBoosterTokensAt:
            groups:
                - api:user:read

App\Entity\UserWallet:
    attributes:
        boosterTokens:
            groups:
                - api:user:read
