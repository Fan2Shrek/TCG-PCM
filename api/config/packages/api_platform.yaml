api_platform:
    title: TCG API
    version: 1.0.0
    formats:
      json: ["application/json"]
      jsonld: ["application/ld+json"]
    defaults:
        stateless: true
        collectDenormalizationErrors: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    exception_to_status:
        App\Game\Exception\GameException: 400
