services:
  db-backup:
    image: ghcr.io/fan2shrek/tcg/db-backup:latest
    build:
      context: ./infra/backup
    volumes:
      - backup_data:/backups
    secrets:
      - db_root_password
      - infisical_db_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - app
      - infisical

secrets:
  db_root_password:
    external: true
  infisical_db_password:
    external: true

volumes:
  backup_data:

networks:
  app:
    external: true
  infisical:
    external: true
