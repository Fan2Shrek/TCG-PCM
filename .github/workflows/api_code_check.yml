name: API code check

on:
  pull_request:
    paths:
      - 'api/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  install-deps:
    name: Install Composer Dependencies
    runs-on: ubuntu-latest
    env:
      WITH_DOCKER: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.composer/cache
            api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
        working-directory: api

  stan:
    name: PHP Static Analysis
    runs-on: ubuntu-latest
    needs: install-deps
    env:
      WITH_DOCKER: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.composer/cache
            api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5

      - name: Run static analysis
        run: make stan

  phpunit:
    name: PHP tests
    runs-on: ubuntu-latest
    needs: install-deps
    env:
      WITH_DOCKER: 0
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/app?serverVersion=10.4.34-MariaDB&charset=utf8mb4

    services:
      mariadb:
        image: mariadb:10.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.composer/cache
            api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          coverage: pcov

      - name: Setup tests environment
        run: make setup-tests

      - name: Run PHPUnit with metrics
        run: |
          make tests-ci | tee phpunit-output.txt

      - name: Extract metrics
        id: metrics
        run: |
          cd api

          TESTS=$(grep -oP '\d+(?=\s+tests)' ../phpunit-output.txt)
          ASSERTIONS=$(grep -oP '\d+(?=\s+assertions)' ../phpunit-output.txt)
          TIME=$(grep -oP '(?<=Time: )\d{2}:\d{2}\.\d{3}' ../phpunit-output.txt)

          COVERAGE=$(grep -oP 'elements="\d+"|coveredelements="\d+"' ./var/coverage.xml | tail -n2 | awk -F'"' 'NR==1{total=$2} NR==2{ covered=$2} END{printf "%.2f\n", covered/total*100}')

          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "assertions=$ASSERTIONS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Download artifact
        id: download-artifact
        uses: dawidd6/action-download-artifact@v18
        if: github.event_name == 'pull_request'
        with:
          workflow: api_tests_metrics.yml
          name: phpunit-baseline
          branch: main
          path: .

      - name: Compute diff
        if: github.event_name == 'pull_request'
        id: diff
        run: |
          BASE_TESTS=$(jq -r .tests baseline.json)
          BASE_ASSERTIONS=$(jq -r .assertions baseline.json)
          BASE_COVERAGE=$(jq -r .coverage baseline.json)

          echo "tests_diff=$((${{ steps.metrics.outputs.tests }} - $BASE_TESTS))" >> $GITHUB_OUTPUT
          echo "assertions_diff=$((${{ steps.metrics.outputs.assertions }} - $BASE_ASSERTIONS))" >> $GITHUB_OUTPUT

          COVERAGE_DIFF=$(echo "scale=2; 62.13 - $BASE_COVERAGE" | bc)
          echo "coverage_diff=$COVERAGE_DIFF" >> $GITHUB_OUTPUT

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TESTS: ${{ steps.metrics.outputs.tests }}
          TESTS_DIFF: ${{ steps.diff.outputs.tests_diff }}
          ASSERTIONS: ${{ steps.metrics.outputs.assertions }}
          ASSERTIONS_DIFF: ${{ steps.diff.outputs.assertions_diff }}
          TIME: ${{ steps.metrics.outputs.time }}
          COVERAGE: ${{ steps.metrics.outputs.coverage }}
          COVERAGE_DIFF: ${{ steps.diff.outputs.coverage_diff }}
        with:
          script: |
            const marker = '## 🧪 PHPUnit Report';

            const tests = parseInt(process.env.TESTS);
            const testsDiff = parseInt(process.env.TESTS_DIFF);
            const assertions = parseInt(process.env.ASSERTIONS);
            const assertionsDiff = parseInt(process.env.ASSERTIONS_DIFF);
            const time = process.env.TIME;
            const coverage = parseFloat(process.env.COVERAGE);
            const coverageDiff = parseFloat(process.env.COVERAGE_DIFF);

            const body = `
            ${marker}

            | Metric     | Current | Diff |
            |-----------|---------|------|
            | Tests      | ${tests} | ${testsDiff >= 0 ? '+' : ''}${testsDiff} |
            | Assertions | ${assertions} | ${assertionsDiff >= 0 ? '+' : ''}${assertionsDiff} |
            | Time       | ${time}s | - |
            | Coverage   | ${coverage}% | ${coverageDiff >= 0 ? '+' : ''}${coverageDiff}% |
            `;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - uses: codecov/codecov-action@v4
        with:
           files: api/var/coverage.xml

  replay:
    name: PHP replay test
    runs-on: ubuntu-latest
    needs: install-deps
    env:
      WITH_DOCKER: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.composer/cache
            api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5

      - name: Run Replays
        run: make tests-replay
