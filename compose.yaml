services:
  php:
    build:
      context: ./api
      target: dev
    ports:
      - "8000:80"
    working_dir: /app
    volumes:
      - ./api:/app

  pma:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
    ports:
      - "8090:80"
    depends_on:
      - db

  db:
    image: mariadb:11.8.2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    volumes:
      - db_data:/var/lib/mysql

  front:
    image: node:24
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./front:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"

  redis:
    image: redis:7

volumes:
  db_data:
