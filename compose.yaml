services:
  php:
    build:
      context: ./api
      target: dev
    ports:
      - "8000:80"
    working_dir: /app
    volumes:
      - ./api:/app

  pma:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
    ports:
      - "8090:80"
    depends_on:
      - db

  db:
    image: mariadb:11.8.2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7

volumes:
  db_data:
